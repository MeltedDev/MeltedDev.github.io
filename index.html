<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f2f0eb;
    --mid: #888;
  }

  html, body {
    min-height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
  }

  /* BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* BANNER */
  .banner-wrap {
    width: 100%;
    margin-bottom: 36px;
    animation: fade-up 0.5s 0.05s ease both;
  }

  .banner-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }

  .tagline {
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: none;
    font-family: 'DM Sans', sans-serif;
    color: var(--mid);
    margin-top: -20px;
    margin-bottom: 44px;
    text-align: center;
    animation: fade-up 0.5s 0.15s ease both;
  }

  /* LINKS */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .link {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 15px 20px;
    background: transparent;
    border: 1.5px solid rgba(242,240,235,0.15);
    border-radius: 4px;
    color: var(--white);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s, transform 0.12s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .link::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--white);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 0;
  }

  .link:hover::before { transform: scaleX(1); }
  .link:hover { color: var(--black); border-color: var(--white); }
  .link:hover .link-icon svg { fill: var(--black); stroke: var(--black); }
  .link:active { transform: scale(0.98); }

  .link-icon, .link-label, .link-arrow {
    position: relative;
    z-index: 1;
  }

  .link-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .link-icon svg {
    width: 18px;
    height: 18px;
    fill: var(--white);
    transition: fill 0.15s, stroke 0.15s;
  }

  .link-label { flex: 1; }

  .link-arrow {
    font-size: 0.9rem;
    opacity: 0.4;
    transition: opacity 0.15s, transform 0.15s;
  }
  .link:hover .link-arrow { opacity: 1; transform: translateX(3px); }

  /* Section label */
  .section-label {
    font-size: 0.6rem;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    align-self: flex-start;
    margin-top: 24px;
    margin-bottom: 4px;
    padding-left: 2px;
  }

  .link { animation: fade-up 0.4s ease both; }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 20px 0 16px;
    animation: fade-up 0.4s 0.5s ease both;
  }

@keyframes fade-up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
